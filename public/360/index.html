<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 360</title>
    <!-- Incluir Pannellum CSS y JS desde CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #e2e8f0; }
        #panorama { width: 100%; height: 100%; }
        .error-msg { font-family: sans-serif; display: flex; align-items: center; justify-center; height: 100%; color: #64748b; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
    // Obtener el nombre de la imagen de la URL (?image=nombre_del_archivo.jpg)
    const urlParams = new URLSearchParams(window.location.search);
    const imageName = urlParams.get('image') || 'default.jpg';

    // Iniciar Pannellum
    pannellum.viewer('panorama', {
        "type": "equirectangular",
        "panorama": "./" + imageName,
        "autoLoad": true,
        "pitch": 0,
        "yaw": 0,
        "hfov": 100,
        "showZoomCtrl": false,
        "fallback": "fallback.jpg", // Imagen por si falla
        "strings": {
            "loadButtonLabel": "Cargar Vista 360",
            "loadingLabel": "Cargando imagen esférica...",
            "genericWebGLError": "Tu navegador no soporta el visor 360°",
            "textureLoadError": "La imagen (" + imageName + ") no fue encontrada en la carpeta /public/360/."
        }
    });
</script>

</body>
</html>
